name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo_app
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U todo -d todo_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test backend
        run: npm run test -w backend

      - name: Test frontend
        run: npm run test -w frontend

      - name: Test e2e
        run: npm run test:e2e
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5433
          DATABASE_USER: todo
          DATABASE_PASSWORD: todo
          DATABASE_NAME: todo_app

      - name: Build backend and frontend
        run: npm run build
